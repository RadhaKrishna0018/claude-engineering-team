name: Deploy dashboard to GitHub Pages

# ⚠️ SECURITY: only enable Pages if this repo is on GitHub Enterprise Cloud with
# Pages visibility set to Private — otherwise the site is PUBLIC. See docs/SETUP.md §4.
on:
  push:
    branches: [master]
    paths: ["dashboard/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage static site (dashboard only — never the ledger)
        run: |
          mkdir -p _site
          cp dashboard/index.html _site/index.html
          printf "User-agent: *\nDisallow: /\n" > _site/robots.txt
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
